<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Flappy 🐦</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #05060a;
    font-family: "Segoe UI", Arial, sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #wrap {
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 9 / 16;
    max-height: 100vh;
  }
  canvas {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 18px;
    box-shadow: 0 0 60px rgba(0, 255, 200, 0.25),
                0 0 0 2px rgba(0, 255, 200, 0.15) inset;
    background: linear-gradient(180deg, #0a1020 0%, #060814 60%, #03040a 100%);
    touch-action: none;
    cursor: pointer;
  }
  #hint {
    position: absolute;
    bottom: 24px;
    left: 0;
    width: 100%;
    text-align: center;
    color: rgba(0, 255, 200, 0.55);
    font-size: 14px;
    letter-spacing: 1px;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="360" height="640"></canvas>
    <div id="hint">לחיצה / רווח כדי לעוף</div>
  </div>

<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

const STATE = { READY: 0, PLAY: 1, DEAD: 2 };
let state = STATE.READY;

let best = +(localStorage.getItem('neonFlappyBest') || 0);
let score = 0;

const GRAVITY = 0.45;
const FLAP = -7.6;
const PIPE_GAP = 165;
const PIPE_W = 62;
const PIPE_SPACING = 230;
const SPEED = 2.6;

const bird = { x: 100, y: H / 2, r: 14, vy: 0, rot: 0 };
let pipes = [];
let frame = 0;
let stars = [];

// רקע כוכבים
for (let i = 0; i < 60; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    z: Math.random() * 0.8 + 0.2
  });
}

function reset() {
  bird.y = H / 2;
  bird.vy = 0;
  bird.rot = 0;
  pipes = [];
  score = 0;
  frame = 0;
  spawnPipe(W + 80);
  spawnPipe(W + 80 + PIPE_SPACING);
  spawnPipe(W + 80 + PIPE_SPACING * 2);
}

function spawnPipe(x) {
  const margin = 70;
  const gapY = margin + Math.random() * (H - PIPE_GAP - margin * 2);
  pipes.push({ x, gapY, passed: false });
}

function flap() {
  if (state === STATE.READY) { state = STATE.PLAY; reset(); state = STATE.PLAY; }
  if (state === STATE.PLAY) { bird.vy = FLAP; }
  if (state === STATE.DEAD) { state = STATE.READY; }
}

// קלט
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});
cv.addEventListener('mousedown', flap);
cv.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

function circleRectHit(cx, cy, r, rx, ry, rw, rh) {
  const nx = Math.max(rx, Math.min(cx, rx + rw));
  const ny = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nx, dy = cy - ny;
  return dx * dx + dy * dy < r * r;
}

function update() {
  frame++;

  // כוכבים נעים
  for (const s of stars) {
    s.x -= s.z * 0.6;
    if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
  }

  if (state !== STATE.PLAY) {
    // ריחוף עדין במסך פתיחה
    bird.y = H / 2 + Math.sin(frame / 22) * 14;
    return;
  }

  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rot = Math.max(-0.5, Math.min(1.2, bird.vy / 12));

  for (const p of pipes) {
    p.x -= SPEED;
    if (!p.passed && p.x + PIPE_W < bird.x) {
      p.passed = true;
      score++;
    }
  }

  if (pipes.length && pipes[0].x < -PIPE_W) {
    pipes.shift();
    const lastX = pipes[pipes.length - 1].x;
    spawnPipe(lastX + PIPE_SPACING);
  }

  // התנגשות
  for (const p of pipes) {
    if (circleRectHit(bird.x, bird.y, bird.r, p.x, 0, PIPE_W, p.gapY) ||
        circleRectHit(bird.x, bird.y, bird.r, p.x, p.gapY + PIPE_GAP, PIPE_W, H - p.gapY - PIPE_GAP)) {
      die();
    }
  }

  if (bird.y + bird.r > H - 4 || bird.y - bird.r < 0) {
    die();
  }
}

function die() {
  if (state === STATE.DEAD) return;
  state = STATE.DEAD;
  if (score > best) {
    best = score;
    localStorage.setItem('neonFlappyBest', best);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawPipe(p) {
  ctx.save();
  ctx.shadowColor = 'rgba(0,255,180,0.7)';
  ctx.shadowBlur = 18;
  const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  grad.addColorStop(0, '#0fffc1');
  grad.addColorStop(1, '#0a9d7a');
  ctx.fillStyle = grad;
  // עליון
  roundRect(p.x, -10, PIPE_W, p.gapY + 10, 10);
  ctx.fill();
  // תחתון
  roundRect(p.x, p.gapY + PIPE_GAP, PIPE_W, H - p.gapY - PIPE_GAP + 10, 10);
  ctx.fill();
  ctx.restore();
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot);
  ctx.shadowColor = 'rgba(255,210,0,0.9)';
  ctx.shadowBlur = 22;
  // גוף
  const g = ctx.createRadialGradient(-4, -4, 2, 0, 0, bird.r + 4);
  g.addColorStop(0, '#fff4b0');
  g.addColorStop(1, '#ffb300');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0, 0, bird.r, 0, Math.PI * 2);
  ctx.fill();
  // כנף
  ctx.fillStyle = '#ff8c00';
  ctx.beginPath();
  const wf = Math.sin(frame / 5) * 4;
  ctx.ellipse(-2, 2 + wf, 8, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // עין
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(6, -5, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(7.5, -5, 2, 0, Math.PI * 2); ctx.fill();
  // מקור
  ctx.fillStyle = '#ff5722';
  ctx.beginPath();
  ctx.moveTo(bird.r - 2, -2);
  ctx.lineTo(bird.r + 7, 0);
  ctx.lineTo(bird.r - 2, 4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawStars() {
  for (const s of stars) {
    ctx.globalAlpha = s.z;
    ctx.fillStyle = '#6ff7e0';
    ctx.fillRect(s.x, s.y, s.z * 2, s.z * 2);
  }
  ctx.globalAlpha = 1;
}

function drawText(txt, y, size, color, glow) {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `bold ${size}px "Segoe UI", Arial`;
  ctx.shadowColor = glow || color;
  ctx.shadowBlur = 16;
  ctx.fillStyle = color;
  ctx.fillText(txt, W / 2, y);
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawStars();

  for (const p of pipes) drawPipe(p);
  drawBird();

  // ניקוד
  if (state === STATE.PLAY) {
    drawText(score, 80, 54, '#fff', 'rgba(0,255,200,0.8)');
  }

  if (state === STATE.READY) {
    drawText('NEON FLAPPY', H / 2 - 120, 40, '#0fffc1');
    drawText('שיא: ' + best, H / 2 - 78, 22, 'rgba(255,255,255,0.7)');
    drawText('לחץ כדי להתחיל', H / 2 + 140, 24, '#fff');
  }

  if (state === STATE.DEAD) {
    ctx.fillStyle = 'rgba(3,4,10,0.55)';
    ctx.fillRect(0, 0, W, H);
    drawText('נפלת! 💥', H / 2 - 90, 44, '#ff4b6e');
    drawText('ניקוד: ' + score, H / 2 - 30, 30, '#fff');
    drawText('שיא: ' + best, H / 2 + 10, 26, '#0fffc1');
    drawText('לחץ לשחק שוב', H / 2 + 120, 24, 'rgba(255,255,255,0.85)');
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

reset();
state = STATE.READY;
loop();
</script>
</body>
</html>
